version: "3.9"

services:

  # ── Express API 后端 ────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: quickai_api
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      LOG_DIR: /app/logs
    volumes:
      - api_logs:/app/logs
      - api_tmp:/app/tmp
    networks:
      - quickai_net
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Nginx 前端 + 反向代理 ────────────────────
  web:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_AUTHING_APP_ID: ${VITE_AUTHING_APP_ID}
        VITE_AUTHING_DOMAIN: ${VITE_AUTHING_DOMAIN}
        VITE_AUTHING_REDIRECT_URI: ${VITE_AUTHING_REDIRECT_URI}
        VITE_AUTHING_LOGOUT_URI: ${VITE_AUTHING_LOGOUT_URI}
        VITE_BASE_URL: ""
    container_name: quickai_web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - quickai_net

volumes:
  api_logs:
    driver: local
  api_tmp:
    driver: local

networks:
  quickai_net:
    driver: bridge
